# Host Nginx reverse proxy for TalentFlow on OCI (single origin + sslip.io).
# Replace TALENTFLOW_HOST with e.g. 129-146-1-2.sslip.io before enabling.
# Certbot will add SSL server blocks when you run:
#   sudo certbot --nginx -d TALENTFLOW_HOST

upstream talentflow_frontend {
    server 127.0.0.1:3000;
}

upstream talentflow_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name TALENTFLOW_HOST;

    client_max_body_size 50m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /api/ {
        proxy_pass http://talentflow_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://talentflow_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
