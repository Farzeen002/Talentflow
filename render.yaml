services:
  - type: web
    name: talentflow-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        value: https://talentflow-demo.netlify.app
      - key: APP_PUBLIC_URL
        value: https://talentflow-api.onrender.com
      - key: CORS_ORIGINS
        value: https://talentflow-demo.netlify.app
      - key: INTERNAL_API_TOKEN
        generateValue: true
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: recrutment_auto
      - key: REDIS_URL
        value: redis://127.0.0.1:6379/0
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: FERNET_KEY
        sync: false
      - key: STORAGE_PROVIDER
        value: gcs
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GCP_PROJECT_ID
        sync: false
      - key: GCP_PRIVATE_KEY_ID
        sync: false
      - key: GCP_PRIVATE_KEY
        sync: false
      - key: GCP_CLIENT_EMAIL
        sync: false
      - key: GCP_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://talentflow-api.onrender.com/api/v1/auth/callback
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        value: https://talentflow-api.onrender.com/api/v1/auth/microsoft/callback
      - key: OUTLOOK_NVITE_FOLDER
        value: Nvite
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: REPORT_TZ
        value: Asia/Kolkata
